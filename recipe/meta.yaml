{% set name = "dessinemoi" %}
{% set version = "26.1.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/dessinemoi-{{ version }}.tar.gz
  sha256: 5e8f5e4e113b8c3c5fae9e4ab22bdf811f293b03ebd89c6e07a9119b8b682667

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - hatchling
    - pip
  run:
    - python >={{ python_min }}
    - attrs >=21

test:
  imports:
    - dessinemoi
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/rayference/dessinemoi
  doc_url: https://dessinemoi.readthedocs.io
  summary: A simple Python factory system
  license: MIT
  license_file: LICENSE
  description: |
    Dessine-moi is a simple Python implementation of the factory pattern. It was
    born from the need to create dynamically object trees from nested
    dictionaries (e.g. a JSON document).


extra:
  recipe-maintainers:
    - leroyvn
